<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"><title>L'industrie 21</title><meta name="theme-color" content="#050704"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><style>:root{--bg:#040503;--surface:#0b0f0a;--text:#f1f7ef;--muted:#8e9d8b;--green:#70ff55;--line:rgba(112,255,85,.14);--blue:#1696e5;--shadow:0 20px 60px rgba(0,0,0,.44)}*{box-sizing:border-box}html,body{margin:0;padding:0;background:#000;color:var(--text);font-family:Inter,system-ui,sans-serif}body{min-height:100vh;background:linear-gradient(180deg,#060805 0%,#030402 100%)}.app{max-width:480px;margin:0 auto;min-height:100vh;padding:16px 16px 96px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}.panel{background:linear-gradient(180deg,rgba(9,12,8,.98),rgba(5,7,5,.98));border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow);padding:18px;margin-bottom:18px}.brand{font-family:Orbitron;font-size:24px;font-weight:800}.brand span{color:var(--green)}.sub{color:var(--muted);font-size:14px;margin-top:8px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.tile{border:0;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);border-radius:22px;overflow:hidden;padding:0;text-align:left;cursor:pointer}.tile img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block}.tile-body{padding:12px}.tile-name{font-weight:800}.tile-price{color:#9eff59;font-weight:900;margin-top:6px}.chiprow{display:flex;gap:10px;overflow:auto}.chip{white-space:nowrap;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.04);color:#d7ded4;border-radius:999px;padding:10px 14px;font-weight:700;cursor:pointer}.chip.active{background:rgba(112,255,85,.18)}.hide{display:none}.product-media{aspect-ratio:1/.8;border-radius:24px;overflow:hidden;background:#11150f}.product-media img{width:100%;height:100%;object-fit:cover;display:block}.thumbs{display:flex;gap:10px;overflow:auto;margin:12px 0 16px}.thumb{width:72px;height:72px;border:0;border-radius:16px;overflow:hidden;flex:0 0 auto;border:2px solid transparent;padding:0;background:#11140f}.thumb.active{border-color:var(--green)}.thumb img{width:100%;height:100%;object-fit:cover;display:block}.product-title{font-size:22px;font-weight:700;color:#d8ddd4;margin:14px 0 10px}.product-desc{color:#98a593;line-height:1.45;margin-bottom:12px}.tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}.tag{padding:8px 10px;border-radius:999px;background:rgba(255,255,255,.05);font-size:12px;font-weight:700}.format-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.format{border:2px solid rgba(255,255,255,.08);background:#10130d;color:#fff;border-radius:22px;padding:16px;display:flex;justify-content:space-between;cursor:pointer;font-weight:800}.format.active{border-color:var(--green);background:rgba(39,77,28,.86)}.btn{width:100%;border:0;border-radius:22px;padding:18px;font-weight:900}.btn1{background:linear-gradient(135deg,#4ebd3d,#7eff57,#59d94a);margin-top:12px}.btn2{background:linear-gradient(135deg,#1696e5,#138fdd,#0f88d5);margin-top:12px;color:#fff}.btn3{background:rgba(255,255,255,.06);color:#fff;border:1px solid rgba(255,255,255,.06);margin-top:12px}.oldprice{text-decoration:line-through;color:#7e8a7a;font-size:14px}.promo{color:#9eff59;font-weight:900;margin-left:8px}.supportbar{margin-top:12px;padding:14px 16px;border-radius:22px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05)}.supporttop{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px;color:#9aa694;font-size:13px;font-weight:700}.supportlinks{display:flex;gap:18px;justify-content:center;flex-wrap:wrap}.supportlinks a{color:#f0c513;text-decoration:none;font-weight:800}.developer{display:flex;justify-content:center;align-items:center;gap:8px;color:#75806f;font-size:13px;margin-top:10px}.cartitem{display:flex;justify-content:space-between;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06)}.muted{color:var(--muted)}.bottomnav{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:min(480px,100%);display:grid;grid-template-columns:repeat(3,1fr);background:rgba(3,5,3,.96);padding:12px 10px calc(12px + env(safe-area-inset-bottom,0px));border-top:1px solid rgba(112,255,85,.1)}.nav{border:0;background:none;color:#98a598;font-weight:800}.nav.active{color:#9eff59}</style></head><body><div class="app"><div class="top"><div class="brand">L’INDUSTRIE <span>21</span></div><div class="muted" id="count"></div></div><div class="panel"><div class="chiprow" id="cats"></div></div><div class="panel" id="catalog"><div class="grid" id="grid"></div></div><div class="panel hide" id="product"><div id="media" class="product-media"></div><div class="thumbs" id="thumbs"></div><div class="product-title" id="title"></div><div class="product-desc" id="desc"></div><div class="tags" id="tags"></div><div class="format-grid" id="formats"></div><button class="btn btn1" id="add">🛒 Ajouter au panier</button><button class="btn btn2" id="orderOne">✈️ Commander ce produit</button><button class="btn btn3" id="back">← Retour au catalogue</button></div><div class="panel hide" id="cart"><div id="cartItems"></div><div style="display:flex;justify-content:space-between;margin-top:12px;font-weight:800"><span>Total</span><span id="total">0 €</span></div><div class="sub">Commande en PV puis paiement à domicile.</div><div class="supportbar"><div class="developer">• Développé par <strong style="color:#d7ded4">L'industrie 21</strong></div><div class="supporttop"><span>Support</span><span>Canal</span></div><div class="supportlinks"><a href="https://t.me/industrie21shop" target="_blank" rel="noopener">Telegram</a><a href="https://t.me/industrie21shop" target="_blank" rel="noopener">Support</a></div></div><button class="btn btn3" id="clear">Vider</button><button class="btn btn2" id="orderCart">Commander</button></div></div><nav class="bottomnav"><button class="nav active" data-view="catalog">Catalogue</button><button class="nav" data-view="product">Produit</button><button class="nav" data-view="cart">Panier</button></nav><script src="products.js"></script><script>const config=window.INDUSTRIE21_CONFIG,products=window.INDUSTRIE21_PRODUCTS;let filter='all',current=products[0],fi=0,mi=0,cart={};const euro=v=>v.toLocaleString('fr-FR')+' €';const cats=['all',...config.categories];const el={cats:document.getElementById('cats'),grid:document.getElementById('grid'),count:document.getElementById('count'),catalog:document.getElementById('catalog'),product:document.getElementById('product'),cart:document.getElementById('cart')};function show(v){el.catalog.classList.toggle('hide',v!=='catalog');el.product.classList.toggle('hide',v!=='product');el.cart.classList.toggle('hide',v!=='cart');document.querySelectorAll('.nav').forEach(b=>b.classList.toggle('active',b.dataset.view===v))}function renderCats(){el.cats.innerHTML=cats.map(x=>`<button class="chip ${filter===x?'active':''}" data-filter="${x}">${x==='all'?'Tout':x}</button>`).join('')}function list(){return filter==='all'?products:products.filter(p=>p.category===filter)}function renderGrid(){const l=list();el.count.textContent=l.length+' produits';el.grid.innerHTML=l.map(p=>`<button class="tile" data-open="${p.id}"><img src="${p.cover}"><div class="tile-body"><div class="tile-name">${p.name}</div><div class="tile-price">À partir de ${euro(Math.min(...p.formats.map(x=>x.price)))}</div></div></button>`).join('')}function renderProduct(){const m=current.gallery[mi]||current.gallery[0];document.getElementById('media').innerHTML=`<img src="${m.src}">`;document.getElementById('thumbs').innerHTML=current.gallery.map((x,i)=>`<button class="thumb ${i===mi?'active':''}" data-mi="${i}"><img src="${x.src}"></button>`).join('');document.getElementById('title').textContent=current.name;document.getElementById('desc').textContent=current.description;document.getElementById('tags').innerHTML=(current.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');document.getElementById('formats').innerHTML=current.formats.map((x,i)=>`<button class="format ${i===fi?'active':''}" data-fi="${i}"><span>${x.label}</span><span>${euro(x.price)}</span></button>`).join('')}function renderCart(){const items=Object.values(cart);document.getElementById('cartItems').innerHTML=items.length?items.map(i=>`<div class="cartitem"><div><div style="font-weight:800">${i.name}</div><div class="muted">${i.format} · ${euro(i.price)}</div></div><div>${i.qty}</div></div>`).join(''):'<div class="muted">Panier vide</div>';document.getElementById('total').textContent=euro(items.reduce((s,i)=>s+i.price*i.qty,0))}document.addEventListener('click',e=>{const df=e.target.closest('[data-filter]'),doe=e.target.closest('[data-open]'),dmi=e.target.closest('[data-mi]'),dfi=e.target.closest('[data-fi]'),dv=e.target.closest('[data-view]');if(df){filter=df.dataset.filter;renderCats();renderGrid();show('catalog'); if(!window.INDUSTRIE21_PRODUCTS){document.body.insertAdjacentHTML('beforeend','<div style=\"position:fixed;top:10px;left:10px;z-index:9999;background:#000;color:#fff;padding:8px\">products missing</div>')} }if(doe){current=products.find(p=>p.id===doe.dataset.open);fi=0;mi=0;renderProduct();show('product')}if(dmi){mi=+dmi.dataset.mi;renderProduct()}if(dfi){fi=+dfi.dataset.fi;renderProduct()}if(dv){show(dv.dataset.view)}});document.getElementById('add').onclick=()=>{const x=current.formats[fi],k=current.id+'__'+x.label;cart[k]??={name:current.name,format:x.label,price:x.price,qty:0};cart[k].qty++;renderCart();show('cart')};document.getElementById('back').onclick=()=>show('catalog'); if(!window.INDUSTRIE21_PRODUCTS){document.body.insertAdjacentHTML('beforeend','<div style=\"position:fixed;top:10px;left:10px;z-index:9999;background:#000;color:#fff;padding:8px\">products missing</div>')} ;document.getElementById('clear').onclick=()=>{cart={};renderCart()};document.getElementById('orderOne').onclick=()=>window.open('https://t.me/'+config.telegramUsername+'?text='+encodeURIComponent(`Salut @${config.telegramUsername}, je veux commander :
- ${current.name} (${current.formats[fi].label}) = ${euro(current.formats[fi].price)}`),'_blank');document.getElementById('orderCart').onclick=()=>{const items=Object.values(cart);if(!items.length)return alert('Ajoute au moins un produit.');const total=items.reduce((s,i)=>s+i.price*i.qty,0);const msg=items.map(i=>`- ${i.name} (${i.format}) x${i.qty} = ${euro(i.price*i.qty)}`).join('
');window.open('https://t.me/'+config.telegramUsername+'?text='+encodeURIComponent(`Salut @${config.telegramUsername}, voici ma commande :

${msg}

Total : ${euro(total)}`),'_blank')};renderCats();renderGrid();renderProduct();renderCart();</script></body></html>
